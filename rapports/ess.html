<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Scanner Code-Barres - QuaggaJS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #0f172a;
            color: white;
        }
        #scanner-container {
            width: 400px;
            margin: auto;
            position: relative;
        }
        video {
            width: 100%;
            border-radius: 10px;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            color: #22c55e;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Scanner Code-Barres</h1>

    <div id="scanner-container"></div>

    <button onclick="startScanner()">Démarrer le scan</button>

    <div id="result">Aucun code détecté</div>
    <script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>
    <script>
        function startScanner() {
        Quagga.init({
            inputStream: {
                type: "LiveStream",
                target: document.querySelector('#scanner-container'),
                constraints: {
                    facingMode: "environment"
                }
            },
            decoder: {
                readers: ["code_128_reader", "ean_reader"]
            },
            locate: true,
            numOfWorkers: navigator.hardwareConcurrency || 4,
            frequency: 10
        }, function(err) {
            if (err) {
                console.error(err);
                return;
            }
            Quagga.start();
        });

        Quagga.onDetected(result => {
            const code = result.codeResult.code;
            document.getElementById("result").innerText = code;
            Quagga.stop();
        });
    }
    </script>

</body>
</html>
