<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Scanner Code-Barres - QuaggaJS</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #0f172a;
            color: white;
        }
        #scanner-container {
            width: 400px;
            margin: auto;
            position: relative;
        }
        video {
            width: 100%;
            border-radius: 10px;
        }
        #result {
            margin-top: 20px;
            font-size: 20px;
            color: #22c55e;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Scanner Code-Barres</h1>

    <div id="scanner-container"></div>

    <button onclick="startScanner()">Démarrer le scan</button>

    <div id="result">Aucun code détecté</div>

    <script>
        function startScanner() {
            Quagga.init({
                inputStream: {
                    type: "LiveStream",
                    target: document.querySelector('#scanner-container'),
                    constraints: {
                        facingMode: "environment" // caméra arrière
                    }
                },
                decoder: {
                    readers: [
                        "code_128_reader",
                        "ean_reader",
                        "ean_8_reader",
                        "upc_reader",
                        "upc_e_reader"
                    ]
                },
                locate: true
            }, function(err) {
                if (err) {
                    console.error(err);
                    alert("Erreur caméra");
                    return;
                }
                Quagga.start();
            });

            // Détection du code
            Quagga.onDetected(function(result) {
                const code = result.codeResult.code;
                document.getElementById("result").innerText = "Code détecté : " + code;
                
                // Stop après détection (optimisation)
                Quagga.stop();
            });
        }
    </script>

</body>
</html>
